<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Always-on STT & Polish Real-time Translation (Debug Mode)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; }
        #status { font-weight: bold; margin-bottom: 10px; color: #0056b3; }
        #error-msg { color: red; font-weight: bold; margin-bottom: 10px; }
        
        #visualizer { 
            width: 100%; 
            height: 80px; 
            background-color: #222; 
            border-radius: 8px;
            margin-bottom: 20px;
        }

        #log-container {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            width: 95%;
            height: 400px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        #interim-box {
            color: #d9534f;
            font-weight: bold;
            font-size: 18px;
            min-height: 28px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #eee;
            padding-bottom: 10px;
        }

        .log-entry {
            margin: 0 0 15px 0;
            padding: 12px;
            background-color: #f8f9fa;
            border-radius: 6px;
            color: #333;
            font-size: 16px;
            animation: fadeIn 0.5s;
            border-left: 4px solid #0056b3;
        }

        .timestamp { font-size: 12px; color: #888; margin-right: 10px; }
        .original-text { margin-bottom: 8px; font-weight: bold; }
        .translated-text { padding-left: 5px; color: #dc143c; font-size: 15px; }

        /* --- Debug Panel Style --- */
        #debug-panel {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 8px;
            width: 95%;
            height: 250px;
            overflow-y: auto;
            font-size: 13px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            /* Visible by default */
            display: block; 
        }

        .debug-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 95%;
            margin-bottom: 5px;
        }

        .debug-msg { margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 3px; }
        .debug-info { color: #569cd6; } /* Blue */
        .debug-api { color: #4ec9b0; }  /* Teal */
        .debug-error { color: #f44336; font-weight: bold; } /* Red */
        
        button { cursor: pointer; padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <h1>🎤 Real-time Korean ➡️ Polish STT Translator</h1>
    
    <canvas id="visualizer"></canvas>

    <div id="status">Status: Checking microphone permissions...</div>
    <div id="error-msg"></div>
    
    <div id="log-container">
        <div id="interim-box"></div>
        <div id="history-box"></div>
    </div>

    <div class="debug-title-bar">
        <h3>🛠️ Debug Console (System Logs)</h3>
        <div>
            <button onclick="document.getElementById('debug-content').innerHTML = ''">Clear Logs</button>
            <button onclick="toggleDebug()">Toggle Window</button>
        </div>
    </div>
    <div id="debug-panel">
        <div id="debug-content"></div>
    </div>

    <script>
        const statusDiv = document.querySelector('#status');
        const errorDiv = document.querySelector('#error-msg');
        const interimBox = document.querySelector('#interim-box');
        const historyBox = document.querySelector('#history-box');
        const canvas = document.querySelector('#visualizer');
        const canvasCtx = canvas.getContext('2d');
        const debugContent = document.querySelector('#debug-content');
        const debugPanel = document.querySelector('#debug-panel');

        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        // 🛠️ Debug log recording function
        function addDebugLog(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const logDiv = document.createElement('div');
            logDiv.className = `debug-msg debug-${type}`;
            
            // Convert object to pretty string
            const safeMessage = typeof message === 'object' ? JSON.stringify(message, null, 2) : message;
            
            logDiv.innerText = `[${time}] ${safeMessage}`;
            debugContent.appendChild(logDiv);
            
            // Keep scroll at bottom
            debugPanel.scrollTop = debugPanel.scrollHeight;
        }

        // Debug window toggle function
        function toggleDebug() {
            debugPanel.style.display = debugPanel.style.display === 'none' ? 'block' : 'none';
        }

        // 🟢 Function to call Ollama API and translate to Polish
        async function translateToPolish(text, uiElement) {
            const OLLAMA_URL = 'http://localhost:11434/api/generate';
            
            const payload = {
                model: 'gemma3n:e2b',
                prompt: text,
                system: "You are a professional translator. Translate the given text into Polish. Output ONLY the translated Polish text without any quotes, explanations, or notes.",
                stream: false
            };

            addDebugLog(`Sending API request... (Model: ${payload.model})`, 'api');
            addDebugLog(`Payload: ${JSON.stringify(payload)}`, 'info');

            try {
                const response = await fetch(OLLAMA_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                addDebugLog(`API Response status code: ${response.status}`, 'api');

                if (!response.ok) {
                    throw new Error(`HTTP Error occurred! Status code: ${response.status}`);
                }

                const data = await response.json();
                addDebugLog(`API Response data received`, 'api');
                addDebugLog(data, 'info'); // Log full response object

                uiElement.innerHTML = `🇵🇱 ${data.response.trim()}`;
            } catch (error) {
                console.error("Ollama API Error:", error);
                
                // Branch debug message by error cause
                if (error.message.includes('Failed to fetch')) {
                    addDebugLog(`Network error: Ollama server is down or CORS error occurred. (Check OLLAMA_ORIGINS="*" setting)`, 'error');
                } else {
                    addDebugLog(`API Error: ${error.message}`, 'error');
                }

                uiElement.innerHTML = "❌ <i>Translation failed (check debug console)</i>";
                uiElement.style.color = "red";
            }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            errorDiv.innerText = "❌ This browser does not support STT API.";
            addDebugLog("Browser unsupported error", "error");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR'; 
            recognition.continuous = true;     
            recognition.interimResults = true; 

            recognition.onstart = () => {
                addDebugLog("🎤 STT Microphone recognition started", "info");
            };

            recognition.onerror = (event) => {
                addDebugLog(`🎤 STT Error occurred: ${event.error}`, "error");
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        const finalTranscript = event.results[i][0].transcript;
                        addDebugLog(`Sentence finalized: "${finalTranscript}"`, "info");

                        const logDiv = document.createElement('div');
                        logDiv.className = 'log-entry';
                        
                        const now = new Date();
                        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                        
                        const originalDiv = document.createElement('div');
                        originalDiv.className = 'original-text';
                        originalDiv.innerHTML = `<span class="timestamp">[${timeStr}]</span> 🗣️ ${finalTranscript}`;
                        
                        const translatedDiv = document.createElement('div');
                        translatedDiv.className = 'translated-text';
                        translatedDiv.innerHTML = `⏳ <i>Translating...</i>`;
                        
                        logDiv.appendChild(originalDiv);
                        logDiv.appendChild(translatedDiv);
                        historyBox.prepend(logDiv);

                        translateToPolish(finalTranscript, translatedDiv);

                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                interimBox.innerText = interimTranscript ? `Listening: ${interimTranscript}` : '';
            };

            recognition.onend = () => {
                addDebugLog("🔄 STT recognition paused. Attempting auto-restart...", "info");
                statusDiv.innerText = "Status: Paused... Listening again 🔄";
                recognition.start(); 
            };

            window.addEventListener('load', async () => {
                addDebugLog("Page loaded. Requesting microphone permissions...", "info");
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    statusDiv.innerText = "Status: ✅ Microphone active. Speak freely!";
                    addDebugLog("Microphone permission granted", "info");
                    visualizeAudio(stream);
                    recognition.start();
                } catch (err) {
                    statusDiv.innerText = "Status: ❌ Microphone connection failed";
                    errorDiv.innerText = `Error: ${err.message}`;
                    addDebugLog(`Microphone connection error: ${err.message}`, "error");
                }
            });
        }

        // Audio visualization (same as before)
        function visualizeAudio(stream) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            
            source.connect(analyser);
            analyser.fftSize = 256; 
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                canvasCtx.fillStyle = '#222';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                const barWidth = (canvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;

                for(let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] / 2;
                    canvasCtx.fillStyle = `rgb(${barHeight + 100}, 200, 250)`;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }
    </script>
</body>
</html>
